server:
  port: 8888
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

# ==================== Spring AI ====================
spring:
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
          maxTokens: 5000
      embedding:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/
        api-key: ${DASHSCOPE_API_KEY}
        options:
          model: text-embedding-v4
          dimensions: 1024

  # ==================== 数据源 ====================
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://127.0.0.1:3306/liang_agent?rewriteBatchedStatements=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==================== 文件上传 ====================
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# ==================== MyBatis-Plus ====================
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ==================== Tavily 搜索引擎 ====================
tavily:
  api-key: ${TAVILY_API_KEY}
  api-url: https://api.tavily.com/search

# ==================== 日志 ====================
logging:
  level:
    org:
      springframework:
        ai: INFO
    io:
      modelcontextprotocol:
        client: ERROR
    com:
      liang:
        agent: DEBUG

# ==================== 存储策略 ====================
storage:
  type: minio    # 可选: minio / aliyun-oss / rustfs

# ==================== MinIO ====================
minio:
  endpoint: http://101.132.158.169:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: liang-agent

# ==================== 向量存储策略 ====================
vectorstore:
  type: milvus   # 可选: milvus / elasticsearch / pgvector

# ==================== Milvus ====================
spring.ai.vectorstore.milvus:
  client:
    host: 101.132.158.169
    port: 19530
  database-name: liang_agent
  collection-name: file_vectors
  embedding-dimension: 1024
  initialize-schema: true
